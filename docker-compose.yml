version: '3.8'

services:
  # =========================================================================
  # Backend: Province-Economy Analysis Engine (ACTIVE)
  # =========================================================================
  backend:
    build: .
    container_name: province-economy-backend
    volumes:
      - ./data/results:/app/data/results
    networks:
      - app-network
    # CLI tool - runs analysis and exits. No ports needed.

