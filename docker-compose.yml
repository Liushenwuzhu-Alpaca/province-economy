services:
  # =========================================================================
  # Nginx: reverse proxy + static frontend
  # =========================================================================
  nginx:
    image: nginx:alpine
    container_name: province-economy-nginx
    ports:
      - "80:80"
    volumes:
      - ./src/server/static:/usr/share/nginx/html:ro,Z
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro,Z
    networks:
      - app-network
    depends_on:
      - backend

  # =========================================================================
  # Backend: FastAPI server (API only, no static files in production)
  # =========================================================================
  backend:
    user: root
    build:
      context: .
    # command: mv /home/appuser/.cache/huggingface/ /root/.cache
    container_name: province-economy-backend
    env_file:
      - .env
    volumes:
      - ./data/results:/app/data/results
      - ./src/agent/chroma_db:/app/src/agent/chroma_db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge